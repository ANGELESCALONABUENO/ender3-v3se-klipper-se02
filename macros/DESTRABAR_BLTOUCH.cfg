[gcode_macro DESTRABAR_BLTOUCH]
description: Destrabe por choque/control de cinemática en X usando SET_KINEMATIC_POSITION (SIN calor ni ventilador)
gcode:
  {% set cycles = params.CYCLES|default(1)|int %}
  {% set feed = params.FEED|default(6000)|float %}
  {% set hit_pos = params.HIT_POS|default(200)|float %}

  {% set x_min = printer.toolhead.axis_minimum.x|float %}
  {% set x_max = printer.toolhead.axis_maximum.x|float %}
  {% set x_safe_left = x_min + 10.0 %}
  {% set x_safe_right = x_max - 10.0 %}
  {% set x_mid = (x_safe_left + x_safe_right) / 2.0 %}

  {% if x_safe_right <= x_safe_left %}
    { action_respond_info("DESTRABAR_BLTOUCH cancelado: límites X inválidos") }
  {% else %}
    { action_respond_info("DESTRABAR_BLTOUCH: posicionando en X medio=" ~ x_mid ~ "mm, ciclos=" ~ cycles ~ ", golpe objetivo=" ~ hit_pos ~ "mm") }

    G28 X

    G90
    G1 X{x_mid} F6000

    { action_respond_info("Aplicando SET_KINEMATIC_POSITION X=0 en la posición actual (aquí se redefine 0)") }
    SET_KINEMATIC_POSITION X=0

    {% for i in range(cycles) %}
      { action_respond_info("Ciclo " ~ (i+1) ~ " de " ~ cycles ~ ") }
      G1 X{hit_pos} F{feed}
      G4 P200
    {% endfor %}

    { action_respond_info("Realizando home en X para restaurar referencia física") }
    G28 X

    # Comprobación final de la sonda
    BLTOUCH_DEBUG COMMAND=reset
    G4 P300
    BLTOUCH_DEBUG COMMAND=pin_down
    G4 P300
    BLTOUCH_DEBUG COMMAND=pin_up
    G4 P300

    { action_respond_info("DESTRABAR_BLTOUCH finalizado. Probar PROBE o G28/Z si es necesario.") }
  {% endif %}
