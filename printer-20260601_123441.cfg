[include mainsail.cfg]

[include material_z_offset.cfg]

[include macros/*.cfg]

[include v3se-config/prtouch.cfg]

[include v3se-config/filament_sensor.cfg]

[exclude_object]

[force_move]
enable_force_move: true

[idle_timeout]
timeout: 99999

[virtual_sdcard]
path: /home/pi/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

# Board/firmware notes:
# - Target board: STM32F103 (28KiB bootloader), USART1 PA10/PA9.
# - Optional direct serial: USART1 PA2/PA3 via LCD IDC header.
# - SD flash requires .bin and a different filename each time.
# - Also valid for GD32F303 based Creality 4.2.2 boards.
# Full reference: docs/Config_Reference.md


# ---------------------------------------------------------------------
# Motion - X/Y axis
# ---------------------------------------------------------------------

[stepper_x]
step_pin: PC2
dir_pin: !PB9
enable_pin: !PC3
microsteps: 64
rotation_distance: 40
endstop_pin: !PA5
position_endstop: -17
position_min: -17
position_max: 219
homing_speed: 50

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 64
rotation_distance: 40
endstop_pin: !PA6
position_endstop: -11
position_min: -11
position_max: 230
homing_speed: 50

# ---------------------------------------------------------------------
# Motion - Z axis
# ---------------------------------------------------------------------

[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -2
position_max: 250
homing_speed: 4
second_homing_speed: 1
homing_retract_dist: 2.0

# ---------------------------------------------------------------------
# TMC drivers
# ---------------------------------------------------------------------

[tmc2209 stepper_x]
uart_pin: PB12
run_current: 0.60
sense_resistor: 0.150
stealthchop_threshold: 0
interpolate: false

[tmc2209 stepper_y]
uart_pin: PB13
run_current: 0.60
sense_resistor: 0.150
stealthchop_threshold: 0
interpolate: false

[tmc2209 stepper_z]
uart_pin: PB14
run_current: 0.8
sense_resistor: 0.150
stealthchop_threshold: 0
interpolate: false

[firmware_retraction]
retract_length: 1.2
retract_speed: 40
unretract_extra_length: 0.02
unretract_speed: 30

[extruder]
max_extrude_only_distance: 300.0
max_extrude_only_velocity: 7
pressure_advance: 0.1
step_pin: PB4
dir_pin: PB3
enable_pin: !PC3
microsteps: 16
rotation_distance: 7.44
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
control: pid
# tuned for stock hardware with 200 degree Celsius target
pid_Kp: 27.142
pid_Ki: 1.371
pid_Kd: 134.351
min_extrude_temp: 50
min_temp: 0
max_temp: 350

[heater_bed]
heater_pin: PB2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
#control: pid
# tuned for stock hardware with 70 degree Celsius target
#pid_kp: 66.371
#pid_ki: 0.846
#pid_kd: 1301.702
min_temp: 0
max_temp: 150

[heater_fan hotend_fan]
pin: PC1
max_power: 1.0
shutdown_speed : 0
cycle_time: 0.010
hardware_pwm: false
kick_start_time: 0.100
off_below: 0.0
heater:extruder
heater_temp : 50
fan_speed : 1.0

[fan]
pin: PA0

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 250
max_accel: 2500
max_z_velocity: 5
square_corner_velocity: 5.0
max_z_accel: 100

[bltouch]
sensor_pin: ^PC14
control_pin: PC13
x_offset: -23.0
y_offset: -14.5
#z_offset: 2.65
speed: 20
pin_move_time: 0.4
stow_on_each_sample: False
probe_with_touch_mode: True

[safe_z_home]
home_xy_position: 140,150
speed: 50
z_hop: 10
z_hop_speed: 5

[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 30,30         # Need to handle head distance with cr-touch (bl_touch)
mesh_max: 190,190     # Max probe range
probe_count: 10,10
algorithm: bicubic

# [display]
# NOT IMPLEMTED (assuming it even works)

[output_pin beeper]
pin: PB0

[screws_tilt_adjust]
screw1: 54.5, 45.5
screw1_name: front left screw
screw2: 224.5, 45.5
screw2_name: front right screw
screw3: 224.5, 215.5
screw3_name: rear right screw
screw4: 54.5, 215.5
screw4_name: rear left screw
horizontal_move_z: 10.
speed: 50.
screw_thread: CCW-M4

# ---------------------------------------------------------------------
# Temperature sensors
# ---------------------------------------------------------------------

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor Orange_Pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

# ---------------------------------------------------------------------
# UI integration
# ---------------------------------------------------------------------

[pause_resume]
recover_velocity: 25

[display_status]

[respond]

# [include shell_command.cfg]


[e3v3se_display]
language: spanish
logging: False

# Display custom macros (jpcurti e3v3se_display)
[e3v3se_display MACRO1]
gcode: calibrar_punta
label: Calibrar punta
icon: 12

[e3v3se_display MACRO2]
gcode: G28
label: Home all
icon: 29

[e3v3se_display MACRO3]
gcode: PID_EXTRUDER
label: PID boquilla
icon: 14

[e3v3se_display MACRO4]
gcode: PID_BED
label: PID cama
icon: 14

[e3v3se_display MACRO5]
gcode: EXTRAER_MATERIAL
label: Extraer material
icon: 9

