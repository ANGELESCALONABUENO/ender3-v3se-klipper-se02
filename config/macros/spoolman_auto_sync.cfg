[gcode_macro FORCE_SPOOLMAN_SYNC]
description: Fuerza sincronización inmediata de Spoolman (ejecuta Python script via gcode_script)
gcode:
  # IMPORTANTE: Esto intenta sincronizar Spoolman ejecutando el script Python via Moonraker.
  # Como alternativa, si hay timeout, espera a que el cron ejecute el sync (cada 5 min).
  
  {% set moon = "http://127.0.0.1:7125" %}
  
  # Ejecutar spoolman_sync.py via Moonraker gcode_script API
  # (Moonraker ejecuta esto como shell command después del gcode)
  RESPOND TYPE=command MSG='FORCE_SPOOLMAN_SYNC: ejecutando /home/pi/klipper_config/spoolman_sync.py'
  
  # Nota: No hay forma segura de ejecutar esto en Klipper sin shell_command, así que
  # esperamos a que el cron lo ejecute. Los logs mostrarán el resultado.

[gcode_macro SPOOLMAN_SYNC_AT_PRINT_START]
description: Dispara sincronización automática desde Moonraker (Spoolman -> Klipper)
gcode:
  # CRÍTICO: Este macro se ejecuta ANTES de APPLY_MATERIAL_Z_OFFSET en START_PRINT.
  # El z_offset de Spoolman debe estar disponible cuando se aplique.
  #
  # Estrategia: Esperar 5 segundos para que el cron de spoolman_sync.py (*/5 min)
  # tenga oportunidad de ejecutarse, OR un sync manual reciente ya haya establecido synced=1.
  # Si aún no sincronizado después de 5s, APPLY_MATERIAL_Z_OFFSET usará valores locales.
  #
  # NOTA TÉCNICA: Idealmente spoolman_sync.py sería un daemon, no un cron job.
  # Ver: docs/maintenance/spoolman-sync-optimization.md
  
  # Esperar 5 segundos (máximo esperado entre ejecuciones del cron)
  G4 P5000
  
  {% set synced = printer["gcode_macro SPOOLMAN_ACTIVE"].synced|default(0)|int %}
  {% set z_off = printer["gcode_macro SPOOLMAN_ACTIVE"].z_offset|default(0.0)|float %}
  {% set pa = printer["gcode_macro SPOOLMAN_ACTIVE"].pressure_advance|default(0.1)|float %}
  {% set fan_lock = printer["gcode_macro SPOOLMAN_ACTIVE"].fan_lock|default(0)|int %}
  
  {% if synced == 1 %}
    { action_respond_info("✓ Spoolman sincronizado: z_offset=" ~ ("%+.3f" % z_off) ~ " pa=" ~ pa ~ " fan_lock=" ~ fan_lock) }
  {% else %}
    { action_respond_info("⚠ Spoolman no sincronizado después de 5s. Si z_offset es crítico, ejecuta spoolman_sync.py manualmente.") }
  {% endif %}

[delayed_gcode SPOOLMAN_IDLE_SYNC_LOOP]
initial_duration: 0  # DESACTIVADO: el cron (*/5 * * * *) maneja la sincronizacion
gcode:
  {% set state = printer.print_stats.state|string|lower %}
  {% if state != "printing" and state != "paused" %}
    SPOOLMAN_SYNC_AT_PRINT_START
  {% endif %}
  UPDATE_DELAYED_GCODE ID=SPOOLMAN_IDLE_SYNC_LOOP DURATION=60

