# Material Z-offset tuning (ajustable por usuario)
#
# Esto NO cambia tu z_offset base guardado en [bltouch].
# Solo aplica un offset adicional por impresion usando SET_GCODE_OFFSET.
#
# Valores solicitados:
# - PLA: +0.15
# - ABS: -0.1
# - TPU: +0.10

[gcode_macro MATERIAL_Z_OFFSET]
description: Valores de ajuste Z por material
variable_pla: 0.15
variable_abs: -0.1
variable_tpu: 0.10
gcode:
  { action_respond_info("MATERIAL_Z_OFFSET: PLA=" ~ pla ~ " ABS=" ~ abs ~ " TPU=" ~ tpu) }

[gcode_macro APPLY_MATERIAL_Z_OFFSET]
description: Aplica Z-offset desde Spoolman (fallback a tabla local PLA/ABS/TPU)
gcode:
  {% set material_hint = params.MATERIAL|default(printer["gcode_macro MATERIAL_RUNTIME"].material_name|default(""))|string|upper %}
  {% set sp_synced = printer["gcode_macro SPOOLMAN_ACTIVE"].synced|default(0)|int %}
  {% set sp_delta = printer["gcode_macro SPOOLMAN_ACTIVE"].z_offset|default(999.0)|float %}
  {% set has_spoolman_z = (sp_synced == 1 and sp_delta > -2.0 and sp_delta < 2.0) %}
  {% set delta = 0.0 %}
  {% set source = "local" %}

  # Si Spoolman está sincronizado y z_offset es válido, usarlo
  {% if has_spoolman_z %}
    {% set delta = sp_delta %}
    {% set source = "Spoolman" %}
  {% else %}
    # Fallback a tabla local PLA/ABS/TPU
    {% if "PLA" in material_hint %}
      {% set delta = printer["gcode_macro MATERIAL_Z_OFFSET"].pla|float %}
    {% elif "ABS" in material_hint %}
      {% set delta = printer["gcode_macro MATERIAL_Z_OFFSET"].abs|float %}
    {% elif "TPU" in material_hint %}
      {% set delta = printer["gcode_macro MATERIAL_Z_OFFSET"].tpu|float %}
    {% elif "GENERIC" in material_hint or material_hint == "" %}
      # Para Generic/vacío, si Spoolman no está sincronizado, es probable que esté por hacerlo.
      # Log con contexto para que el usuario sepa qué pasó.
      { action_respond_info("Z_OFFSET: material_hint='" ~ material_hint ~ "' synced=" ~ sp_synced ~ " (Spoolman esperado para Generic)") }
    {% endif %}
  {% endif %}

  # Evita acumulación entre impresiones.
  SET_GCODE_OFFSET Z=0 MOVE=0

  {% if delta != 0.0 %}
    SET_GCODE_OFFSET Z_ADJUST={delta} MOVE=0
  {% endif %}
  
  { action_respond_info("Z_OFFSET aplicado (" ~ source ~ "): " ~ ("%+.3f" % delta) ~ " [material=" ~ material_hint ~ ", synced=" ~ sp_synced ~ "]") }
